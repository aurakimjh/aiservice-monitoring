# ═══════════════════════════════════════════════════════════════════
# AITOP Production Stack — v0.9.0-rc.1
#
# 상용 배포용 (AGPL-free, 모든 컴포넌트 Apache 2.0 / BSD / MIT)
#
# 포함:
#   - OTel Collector (Apache 2.0) — 텔레메트리 수집·처리
#   - Prometheus (Apache 2.0) — 메트릭 저장 (30일 보존)
#   - Jaeger (Apache 2.0) — 트레이스 저장 (7일 보존)
#   - Collection Server (AITOP) — 에이전트 데이터 수신 + API
#   - Frontend (AITOP) — Next.js 모니터링 UI
#
# 실행:
#   docker compose -f docker-compose.production.yaml up -d
#
# 접속:
#   AITOP UI:    http://localhost:3000
#   API:         http://localhost:8080
#   Jaeger UI:   http://localhost:16686
#   Prometheus:  http://localhost:9090
# ═══════════════════════════════════════════════════════════════════

networks:
  aitop:
    driver: bridge

volumes:
  prometheus_data:
  jaeger_data:
  aitop_data:

services:

  # ── OTel Collector (Apache 2.0) ──────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.104.0
    container_name: aitop-otel-collector
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./infra/docker/otelcol-commercial.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
      - "8889:8889"    # Prometheus scrape endpoint
      - "13133:13133"  # Health check
    networks:
      - aitop
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Prometheus (Apache 2.0) ──────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: aitop-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=10GB"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
      - "--web.console.libraries=/etc/prometheus/console_libraries"
      - "--web.console.templates=/etc/prometheus/consoles"
    volumes:
      - ./infra/docker/prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - ./infra/docker/prometheus-rules.yaml:/etc/prometheus/rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - aitop
    depends_on:
      otel-collector:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  # ── Jaeger (Apache 2.0) — 분산 추적 ─────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.58
    container_name: aitop-jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
      - BADGER_SPAN_STORE_TTL=168h
    volumes:
      - jaeger_data:/badger
    ports:
      - "16686:16686"  # Jaeger UI
      - "4320:4317"    # OTLP gRPC (Collector → Jaeger)
    networks:
      - aitop
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ── Collection Server (AITOP) ────────────────────────────────────
  collection-server:
    image: aitop/collection-server:0.9.0-rc.1
    build:
      context: ./agent
      dockerfile: ../infra/docker/Dockerfile.collection-server
    container_name: aitop-collection-server
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      - AITOP_LISTEN_ADDR=:8080
      - AITOP_GRPC_ADDR=:50051
      - AITOP_LOG_LEVEL=info
      - AITOP_STORAGE_TYPE=local
      - AITOP_STORAGE_PATH=/var/aitop/data
      - AITOP_STORAGE_RETENTION_DAYS=30
      - AITOP_PROMETHEUS_URL=http://prometheus:9090
      - AITOP_JAEGER_URL=http://jaeger:16686
    volumes:
      - aitop_data:/var/aitop/data
    depends_on:
      otel-collector:
        condition: service_healthy
    networks:
      - aitop
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Frontend (AITOP — Next.js) ──────────────────────────────────
  frontend:
    image: aitop/frontend:0.9.0-rc.1
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aitop-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://collection-server:8080/api/v1
      - NODE_ENV=production
    depends_on:
      collection-server:
        condition: service_healthy
    networks:
      - aitop
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
