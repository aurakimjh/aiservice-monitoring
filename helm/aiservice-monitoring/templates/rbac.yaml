{{- if .Values.rbac.create }}
---
# Namespace: monitoring
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    {{- include "aiservice-monitoring.labels" . | nindent 4 }}
    purpose: observability

---
# Namespace: ai-inference
apiVersion: v1
kind: Namespace
metadata:
  name: ai-inference
  labels:
    {{- include "aiservice-monitoring.labels" . | nindent 4 }}
    purpose: ai-workloads
    otel-collector/scrape: "true"

---
# OTel Collector ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aiservice-monitoring.serviceAccountName" . }}
  namespace: {{ include "aiservice-monitoring.namespace" . }}
  labels:
    {{- include "aiservice-monitoring.labels" . | nindent 4 }}

---
# ClusterRole: K8s 메타데이터 조회 권한
# k8sattributes processor + k8s_cluster receiver에 필요
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "aiservice-monitoring.fullname" . }}-otel-collector
  labels:
    {{- include "aiservice-monitoring.labels" . | nindent 4 }}
rules:
  # Pod, Node, Service 메타데이터 조회 (k8sattributes)
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - nodes/metrics
      - services
      - endpoints
      - pods
      - namespaces
    verbs: [get, list, watch]

  # Deployment, StatefulSet 등 워크로드 정보
  - apiGroups: [apps]
    resources:
      - replicasets
      - deployments
      - statefulsets
      - daemonsets
    verbs: [get, list, watch]

  # Ingress 정보
  - apiGroups: [extensions, networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]

  # Prometheus 스크레이프용 메트릭 엔드포인트
  - nonResourceURLs: [/metrics, /metrics/cadvisor]
    verbs: [get]

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "aiservice-monitoring.fullname" . }}-otel-collector
  labels:
    {{- include "aiservice-monitoring.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "aiservice-monitoring.fullname" . }}-otel-collector
subjects:
  - kind: ServiceAccount
    name: {{ include "aiservice-monitoring.serviceAccountName" . }}
    namespace: {{ include "aiservice-monitoring.namespace" . }}

---
# DCGM Exporter ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "aiservice-monitoring.fullname" . }}-dcgm-exporter
  namespace: {{ include "aiservice-monitoring.namespace" . }}
  labels:
    {{- include "aiservice-monitoring.labels" . | nindent 4 }}
{{- end }}
