{{- if .Values.collectionServer.enabled }}
{{- if not .Values.collectionServer.existingSecrets }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aiservice-monitoring.fullname" . }}-jwt-secret
  namespace: {{ include "aiservice-monitoring.namespace" . }}
  labels:
    {{- include "aiservice-monitoring.labels" . | nindent 4 }}
type: Opaque
data:
  secret: {{ .Values.collectionServer.jwtSecret | b64enc | quote }}
{{- if .Values.collectionServer.database.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aiservice-monitoring.fullname" . }}-db-credentials
  namespace: {{ include "aiservice-monitoring.namespace" . }}
  labels:
    {{- include "aiservice-monitoring.labels" . | nindent 4 }}
type: Opaque
data:
  database-url: {{ .Values.collectionServer.database.url | b64enc | quote }}
{{- end }}
{{- if or (eq .Values.collectionServer.storage.type "s3") (eq .Values.collectionServer.storage.type "dual") }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aiservice-monitoring.fullname" . }}-s3-credentials
  namespace: {{ include "aiservice-monitoring.namespace" . }}
  labels:
    {{- include "aiservice-monitoring.labels" . | nindent 4 }}
type: Opaque
data:
  access-key: {{ .Values.collectionServer.storage.s3.accessKey | b64enc | quote }}
  secret-key: {{ .Values.collectionServer.storage.s3.secretKey | b64enc | quote }}
{{- end }}
{{- end }}
{{- end }}
