# AITOP 통합 테스트 환경 — Docker Compose
# Phase 17: Agent 실데이터 → Collection Server → UI 전체 파이프라인 검증
#
# 실행: docker compose -f infra/docker/docker-compose.test.yaml up -d
# 중지: docker compose -f infra/docker/docker-compose.test.yaml down -v

services:
  # ═══════════════════════════════════════════════════════════
  # 1. Collection Server — 에이전트 데이터 수신 + Fleet 관리
  # ═══════════════════════════════════════════════════════════
  collection-server:
    build:
      context: ../../agent
      dockerfile: ../infra/docker/Dockerfile.collection-server
    ports:
      - "8080:8080"        # REST API
      - "50051:50051"      # gRPC (향후)
    environment:
      - AITOP_LISTEN_ADDR=:8080
      - AITOP_LOG_LEVEL=debug
      - AITOP_STORAGE_TYPE=local
      - AITOP_STORAGE_PATH=/var/aitop/data
      - AITOP_STORAGE_RETENTION_DAYS=7
      - AITOP_S3_ENDPOINT=minio:9000
      - AITOP_S3_BUCKET=aitop-evidence
      - AITOP_S3_ACCESS_KEY=minioadmin
      - AITOP_S3_SECRET_KEY=minioadmin
      - AITOP_S3_USE_SSL=false
      - AITOP_DB_URL=postgres://aitop:aitop@postgres:5432/aitop_collection?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - aitop-test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ═══════════════════════════════════════════════════════════
  # 2. PostgreSQL — 에이전트/작업/진단 상태 저장
  # ═══════════════════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: aitop_collection
      POSTGRES_USER: aitop
      POSTGRES_PASSWORD: aitop
    volumes:
      - ../../agent/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql:ro
      - pgdata:/var/lib/postgresql/data
    networks:
      - aitop-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitop -d aitop_collection"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ═══════════════════════════════════════════════════════════
  # 3. MinIO — S3 호환 Evidence 저장소
  # ═══════════════════════════════════════════════════════════
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"        # S3 API
      - "9001:9001"        # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    networks:
      - aitop-test
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  # MinIO 초기 버킷 생성
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/aitop-evidence --ignore-existing &&
      mc mb local/aitop-terminal-logs --ignore-existing &&
      mc mb local/aitop-diagnostics --ignore-existing &&
      echo 'Buckets created successfully'
      "
    networks:
      - aitop-test

  # ═══════════════════════════════════════════════════════════
  # 4. OTel Monitoring Stack (Prometheus + Tempo + Loki + Grafana)
  # ═══════════════════════════════════════════════════════════
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.91.0
    ports:
      - "4317:4317"        # OTLP gRPC
      - "4318:4318"        # OTLP HTTP
      - "13133:13133"      # Health check
    volumes:
      - ./otelcol-local.yaml:/etc/otelcol/config.yaml:ro
    networks:
      - aitop-test
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yaml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules.yaml:/etc/prometheus/rules.yml:ro
    networks:
      - aitop-test
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/ready"]
      interval: 10s
      timeout: 5s
      retries: 3

  tempo:
    image: grafana/tempo:2.5.0
    ports:
      - "3200:3200"
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
    command: ["-config.file=/etc/tempo.yaml"]
    networks:
      - aitop-test

  loki:
    image: grafana/loki:3.1.0
    ports:
      - "3100:3100"
    volumes:
      - ./loki.yaml:/etc/loki/local-config.yaml:ro
    networks:
      - aitop-test

  # ═══════════════════════════════════════════════════════════
  # 5. Frontend — Next.js 모니터링 UI
  # ═══════════════════════════════════════════════════════════
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://collection-server:8080/api/v1
      - NODE_ENV=production
    depends_on:
      - collection-server
    networks:
      - aitop-test

  # ═══════════════════════════════════════════════════════════
  # 6. 테스트 대상 서버 (Agent 수집 대상)
  # ═══════════════════════════════════════════════════════════

  # API 서버 (FastAPI + RAG demo)
  test-api-server:
    build:
      context: ../../demo/rag-service
    ports:
      - "8000:8000"
    environment:
      - MOCK_MODE=true
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
      - OTEL_SERVICE_NAME=test-rag-service
    networks:
      - aitop-test

  # DB 서버 (PostgreSQL — 모니터링 대상)
  test-db-server:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: testapp
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    networks:
      - aitop-test

  # WEB 서버 (Nginx — 모니터링 대상)
  test-web-server:
    image: nginx:alpine
    ports:
      - "8081:80"
    volumes:
      - ./nginx-test.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - aitop-test

volumes:
  pgdata:
  minio-data:

networks:
  aitop-test:
    driver: bridge
