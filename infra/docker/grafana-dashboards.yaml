apiVersion: 1

providers:
  - name: AI Service Dashboards
    orgId: 1
    folder: "AI Service Monitoring"
    folderUid: aiservice-monitoring
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
