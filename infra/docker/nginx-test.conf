# Nginx test server — AITOP WEB Collector 테스트 대상
server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /stub_status {
        stub_status;
        allow 172.0.0.0/8;
        deny all;
    }

    location /health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }
}
