global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: local-dev
    environment: development

rule_files:
  - /etc/prometheus/rules/*.yaml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []  # 로컬 개발 환경: Alertmanager 없음

scrape_configs:
  # OTel Collector 자체 메트릭
  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8889]
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: "(otelcol|aiservice)_.*"
        action: keep

  # Collector 내부 상태 메트릭
  - job_name: otel-collector-internal
    static_configs:
      - targets: [otel-collector:8888]

  # Prometheus 자기 자신 모니터링
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
