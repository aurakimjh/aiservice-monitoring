# kind-config.yaml — AITOP 로컬 K8s 클러스터 설정
#
# 사용법:
#   kind create cluster --name aitop --config infra/kubernetes/kind-config.yaml
#   kubectl cluster-info --context kind-aitop
#
# 삭제:
#   kind delete cluster --name aitop

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: aitop

# 4 노드: control-plane + worker x 3
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    # Ingress 컨트롤러용 포트 매핑
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP

  - role: worker
    labels:
      node-role: monitoring
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "node-role=monitoring"

  - role: worker
    labels:
      node-role: workload
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "node-role=workload"

  - role: worker
    labels:
      node-role: workload
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "node-role=workload"

# 네트워킹
networking:
  # Pod 서브넷
  podSubnet: "10.244.0.0/16"
  # Service 서브넷
  serviceSubnet: "10.96.0.0/16"
