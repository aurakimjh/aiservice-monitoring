---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: monitoring
  labels:
    app.kubernetes.io/managed-by: aiservice-monitoring
    purpose: observability

---
# OTel Collector 전용 ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: monitoring
  labels:
    app: otel-collector

---
# ClusterRole: K8s 메타데이터 조회 권한
# k8sattributes processor와 k8s_cluster receiver에 필요
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
  labels:
    app: otel-collector
rules:
  # Pod, Node, Service 메타데이터 조회 (k8sattributes)
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - nodes/metrics
      - services
      - endpoints
      - pods
      - namespaces
    verbs: [get, list, watch]

  # Deployment, StatefulSet 등 워크로드 정보 (k8sattributes)
  - apiGroups: [apps]
    resources:
      - replicasets
      - deployments
      - statefulsets
      - daemonsets
    verbs: [get, list, watch]

  # Ingress 정보
  - apiGroups: [extensions, networking.k8s.io]
    resources: [ingresses]
    verbs: [get, list, watch]

  # Prometheus 스크레이프용 메트릭 엔드포인트
  - nonResourceURLs: [/metrics, /metrics/cadvisor]
    verbs: [get]

---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
  labels:
    app: otel-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: monitoring

---
# DCGM Exporter 전용 ServiceAccount (GPU 노드 접근 권한)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: dcgm-exporter
  namespace: monitoring

---
# AI Inference 네임스페이스 (vLLM, 가드레일 등 AI 서비스 배포 공간)
apiVersion: v1
kind: Namespace
metadata:
  name: ai-inference
  labels:
    app.kubernetes.io/managed-by: aiservice-monitoring
    purpose: ai-workloads
    # OTel Collector가 이 네임스페이스 Pod에서 메타데이터를 수집하도록 레이블 지정
    otel-collector/scrape: "true"
