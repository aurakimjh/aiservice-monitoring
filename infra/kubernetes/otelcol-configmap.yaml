---
# Agent Collector ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-agent-config
  namespace: monitoring
  labels:
    app: otel-collector
    role: agent
data:
  otelcol-agent.yaml: |
    # 전체 설정은 collector/config/otelcol-agent.yaml 참조
    # 프로덕션 배포 시 해당 파일 내용을 여기에 삽입하거나
    # Helm values로 주입합니다.
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      file_storage:
        directory: /var/otelcol/storage

    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 5s
        limit_percentage: 75
        spike_limit_percentage: 15
      k8sattributes:
        auth_type: serviceAccount
        extract:
          metadata:
            - k8s.namespace.name
            - k8s.deployment.name
            - k8s.pod.name
            - k8s.node.name
          labels:
            - tag_name: ai.service.layer
              key: ai-layer
              from: pod
      resourcedetection:
        detectors: [env, k8s_node]
        timeout: 10s
      filter/drop_noise:
        error_mode: ignore
        traces:
          span:
            - 'attributes["http.route"] == "/health"'
            - 'attributes["http.route"] == "/readyz"'
      batch:
        send_batch_size: 512
        timeout: 5s

    exporters:
      otlp/gateway:
        endpoint: "otel-collector-gateway:4317"
        tls:
          insecure: true
        compression: gzip
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 30s
        sending_queue:
          enabled: true
          queue_size: 1000
          storage: file_storage

    service:
      extensions: [health_check, file_storage]
      telemetry:
        logs:
          level: warn
        metrics:
          level: basic
          address: 0.0.0.0:8888
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection, filter/drop_noise, batch]
          exporters:  [otlp/gateway]
        metrics:
          receivers:  [otlp]
          processors: [memory_limiter, k8sattributes, resourcedetection, batch]
          exporters:  [otlp/gateway]
        logs:
          receivers:  [otlp]
          processors: [memory_limiter, k8sattributes, batch]
          exporters:  [otlp/gateway]

---
# Gateway Collector Service (LoadBalancer — Trace ID 기반 분산)
apiVersion: v1
kind: Service
metadata:
  name: otel-collector-gateway
  namespace: monitoring
  labels:
    app: otel-collector
    role: gateway
spec:
  selector:
    app: otel-collector
    role: gateway
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: prometheus
      port: 8889
      targetPort: 8889
    - name: health
      port: 13133
      targetPort: 13133
  type: ClusterIP

---
# Agent Collector Service (ClusterIP — Pod 내 사이드카 접근용)
apiVersion: v1
kind: Service
metadata:
  name: otel-collector-agent
  namespace: monitoring
  labels:
    app: otel-collector
    role: agent
spec:
  selector:
    app: otel-collector
    role: agent
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: internal-metrics
      port: 8888
      targetPort: 8888
  clusterIP: None   # Headless — Prometheus가 개별 Pod를 직접 스크레이프
