---
# Prometheus Operator — ServiceMonitor 정의
# 전제: kube-prometheus-stack 또는 prometheus-operator가 설치되어 있어야 함
# ServiceMonitor는 Prometheus가 자동으로 스크레이프 대상을 발견하도록 설정합니다.

# ── OTel Collector Agent 메트릭 스크레이프 ─────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: otel-collector-agent
  namespace: monitoring
  labels:
    # Prometheus Operator가 이 레이블로 ServiceMonitor를 선택
    release: kube-prometheus-stack
    app: otel-collector
    role: agent
spec:
  selector:
    matchLabels:
      app: otel-collector
      role: agent
  namespaceSelector:
    matchNames:
      - monitoring
  endpoints:
    # Collector 자체 내부 메트릭 (수집/처리/내보내기 상태)
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
      honorLabels: true

---
# ── OTel Collector Gateway 메트릭 스크레이프 ───────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: otel-collector-gateway
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    app: otel-collector
    role: gateway
spec:
  selector:
    matchLabels:
      app: otel-collector
      role: gateway
  namespaceSelector:
    matchNames:
      - monitoring
  endpoints:
    # 애플리케이션 메트릭 (AI 서비스 지표: TTFT, TPS, GPU 등)
    - port: prometheus
      path: /metrics
      interval: 15s          # AI 지표는 더 자주 수집
      scrapeTimeout: 10s
      honorLabels: true
    # Collector 내부 메트릭
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s

---
# ── DCGM Exporter (GPU 메트릭) 스크레이프 ─────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dcgm-exporter
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    app: dcgm-exporter
spec:
  selector:
    matchLabels:
      app: dcgm-exporter
  namespaceSelector:
    matchNames:
      - monitoring
  endpoints:
    - port: metrics
      path: /metrics
      interval: 15s          # GPU 지표는 15초마다 수집 (이상 탐지 민감도)
      scrapeTimeout: 10s
      honorLabels: true
      # GPU 지표 필터링: 필요한 지표만 보존 (cardinality 관리)
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: "DCGM_FI_DEV_(GPU_UTIL|FB_USED|FB_FREE|POWER_USAGE|GPU_TEMP|SM_CLOCK|MEM_COPY_UTIL|ECC_.*|XID_ERRORS)"
          action: keep
        # GPU UUID를 pod 이름으로 매핑 (가독성 향상)
        - sourceLabels: [gpu]
          targetLabel: gpu_index
          regex: "([0-9]+)"
          replacement: "gpu-${1}"

---
# ── vLLM Inference 서비스 스크레이프 ──────────────────────────────
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: vllm-inference
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: llm-inference
  namespaceSelector:
    matchNames:
      - ai-inference
  podMetricsEndpoints:
    - port: metrics
      path: /metrics
      interval: 10s          # LLM 추론 엔진은 10초 주기 (TTFT/TPS 실시간 추적)
      scrapeTimeout: 8s
      # vLLM 지표명을 OTel 표준명으로 relabeling
      metricRelabelings:
        - sourceLabels: [__name__]
          regex: "vllm:(time_to_first_token_seconds|generation_tokens_per_second|scheduler_running|num_requests_waiting|num_requests_running|gpu_cache_usage_perc).*"
          action: keep
        - sourceLabels: [__name__]
          regex: "vllm:(.*)"
          targetLabel: __name__
          replacement: "vllm_${1}"

---
# ── PrometheusRule — AI 서비스 Recording Rules ─────────────────────
# Recording Rules: 자주 사용하는 복잡한 쿼리를 미리 계산하여 저장
# Grafana 대시보드 로딩 속도 향상 + Prometheus 쿼리 부하 감소
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: aiservice-recording-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
    role: alert-rules
spec:
  groups:
    - name: llm.recording
      interval: 30s
      rules:
        # TTFT P95 — 사전 계산 (대시보드에서 즉시 로딩)
        - record: job:llm_ttft_p95:rate5m
          expr: |
            histogram_quantile(0.95,
              rate(aiservice_llm_time_to_first_token_bucket[5m])
            )

        # TPS P50
        - record: job:llm_tps_p50:rate5m
          expr: |
            histogram_quantile(0.50,
              rate(aiservice_llm_tokens_per_second_bucket[5m])
            )

        # 가드레일 차단율 (5분 이동 평균)
        - record: job:guardrail_block_rate:rate5m
          expr: |
            rate(aiservice_guardrail_block_total[5m]) /
            rate(aiservice_guardrail_request_total[5m])

        # GPU VRAM 사용률
        - record: job:gpu_vram_utilization:avg
          expr: |
            avg by (gpu, node) (
              aiservice_gpu_memory_used /
              (aiservice_gpu_memory_used + aiservice_gpu_memory_free)
            ) * 100

        # 외부 API 에러율
        - record: job:external_api_error_rate:rate5m
          expr: |
            rate(aiservice_external_api_error_total[5m]) /
            rate(aiservice_external_api_request_total[5m])

        # Semantic Cache 히트율
        - record: job:semantic_cache_hit_rate:rate5m
          expr: |
            rate(aiservice_vectordb_cache_hit_total[5m]) /
            (rate(aiservice_vectordb_cache_hit_total[5m]) +
             rate(aiservice_vectordb_cache_miss_total[5m]))
