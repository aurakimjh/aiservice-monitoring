# AITOP Phase 7'-2: Locust 부하 테스트 설정
# =========================================
# 참조: https://docs.locust.io/en/stable/configuration.html
#
# 실행:
#   cd locust && locust                          # Web UI 모드
#   locust --headless --run-time 10m             # 헤드리스 (10분)
#   locust --headless --run-time 10m --csv=results/e2e_load  # CSV 출력

# ── 대상 호스트 ────────────────────────────────────────────
host = http://localhost:8080

# ── 사용자 설정 ────────────────────────────────────────────
# 최대 동시 사용자 수 (목표: 200)
users = 200

# 사용자 증가 속도 (초당)
# 200명 도달까지 20초 소요
spawn-rate = 10

# 테스트 실행 시간 (헤드리스 모드에서만 적용)
# run-time = 10m

# ── 출력 설정 ─────────────────────────────────────────────
# Web UI 바인딩
web-host = 0.0.0.0
web-port = 8089

# HTML 리포트 자동 생성
html = reports/e2e_load_report.html

# CSV 출력 (--headless 시 활성화 권장)
# csv = reports/e2e_load

# 로그레벨
loglevel = INFO

# ── 헤드리스 모드 설정 (CI/CD 자동화용) ─────────────────────
# headless = true
# run-time = 10m
# csv = reports/e2e_load_$(date +%Y%m%d_%H%M%S)

# ── 성능 목표 (참고용) ───────────────────────────────────────
# p50  응답시간: < 500ms
# p95  응답시간: < 2000ms
# p99  응답시간: < 5000ms
# 실패율:        < 1%
# 목표 RPS:      ~ 1000 req/s (200 users × 5 req/s)
